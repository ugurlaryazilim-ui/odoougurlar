services:
  sync-agent:
    build: .
    container_name: ugurlar-image-sync
    restart: unless-stopped
    volumes:
      # Windows klasörünü container'a bağla
      # Bu yolu değiştirmek için: docker-compose.yml düzenle → docker compose up -d --build
      - "Y:\\Pazaryerleri\\entegre ürün görselleri:/data/images"
      # Config dosyasını bağla
      - ./config.json:/app/config.json
    environment:
      - TZ=Europe/Istanbul
