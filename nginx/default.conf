upstream odoo {
    server odoo:8069;
}

server {
    listen 80;
    server_name _;
    # HTTP → HTTPS yeniden yönlendirme
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/odoo.crt;
    ssl_certificate_key /etc/nginx/ssl/odoo.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # Uzun bağlantılar için timeout
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Büyük dosya yükleme desteği
    client_max_body_size 200m;

    # WebSocket desteği (Odoo longpolling)
    location /websocket {
        proxy_pass http://odoo;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Tüm istekler → Odoo
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Statik dosyalar cache
    location ~* /web/static/ {
        proxy_pass http://odoo;
        proxy_cache_valid 200 60m;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }
}
